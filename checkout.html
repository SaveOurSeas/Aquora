<!DOCTYPE html>
<html>
<head>
<title>Checkout</title>
<style>
body { font-family: Arial; background:#0b1e2d; color:white; text-align:center; padding:50px; }

.box { background:#102c3d; padding:30px; display:inline-block; border-radius:10px; }

button {
    margin-top:20px;
    padding:10px 20px;
    background:#00d4ff;
    border:none;
    font-weight:bold;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="box">
<h1>Checkout</h1>

<p id="product"></p>
<p id="price"></p>

<button onclick="confirmBuy()">Confirm Purchase</button>
</div>

<script>
let product = localStorage.getItem("product");
let price = localStorage.getItem("price");

document.getElementById("product").innerText = "Product: " + product;
document.getElementById("price").innerText = "Price: $" + price;

function confirmBuy(){
    window.location.href = "confirmation.html";
}
</script>

</body>
</html>
