<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
<script src="app.js"></script>
</head>
<body>

<nav>
<h1>Cart</h1>
<a href="shop.html">Shop</a>
</nav>

<div class="container" id="cart"></div>

<h2 id="total"></h2>

<button onclick="window.location='checkout.html'">
Checkout
</button>

<script>
let c = JSON.parse(localStorage.getItem("cart")) || [];
let box = document.getElementById("cart");
let total = 0;

c.forEach(i => {
    total += i.price * i.qty;

    box.innerHTML += `
    <div class="card">
        <h3>${i.name}</h3>
        <p>${i.qty} × ${i.price} EGP</p>
        <button onclick="changeQty('${i.name}',1)">+</button>
        <button onclick="changeQty('${i.name}',-1)">-</button>
        <button onclick="removeItem('${i.name}')">Remove</button>
    </div>`;
});

document.getElementById("total").innerText = "Total: " + total + " EGP";
</script>

</body>
</html>
