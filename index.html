<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aquora</title>

<style>
body {
    margin: 0;
    font-family: Inter, Arial, sans-serif;
    color: white;
    background: #050b18;
    overflow-x: hidden;
}

/* BACKGROUND */
.background {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: 0;
}
.grid {
    position: absolute;
    width: 200%;
    height: 200%;
    background-image:
        linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
    background-size: 60px 60px;
    transform: rotate(12deg);
    opacity: 0.2;
}

/* NAV */
nav {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 12px 20px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    background: rgba(10,15,30,0.7);
    backdrop-filter: blur(12px);
    z-index: 10;
}

.logo img {
    width: 40px;
    height: 40px;
    border-radius: 8px;
}

.nav-links {
    display: flex;
    justify-content: center;
    gap: 18px;
}

nav a {
    cursor: pointer;
    opacity: 0.7;
    text-decoration: none;
    color: white;
}
nav a:hover { opacity: 1; }

/* SECTIONS */
section {
    display: none;
    padding: 110px 30px;
}
section.active { display: block; }

/* HERO */
.hero {
    max-width: 1100px;
    margin: auto;
    display: flex;
    gap: 40px;
    flex-wrap: wrap;
    align-items: center;
}

/* IMAGE */
.hero img {
    width: 100%;
    max-width: 340px;
    border-radius: 16px;
}

/* CARDS */
.grid3 {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
    margin-top: 40px;
}

.card {
    background: rgba(255,255,255,0.05);
    border-radius: 16px;
    padding: 20px;
    border: 1px solid rgba(255,255,255,0.08);
}

/* SHOP BUTTONS UPGRADE */
.shop-btn {
    margin-top: 10px;
    padding: 12px 16px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #00b7ff, #3b82f6);
    color: white;
    cursor: pointer;
    transition: 0.2s;
}
.shop-btn:hover {
    transform: scale(1.05);
}

/* CART */
.item {
    display:flex;
    justify-content:space-between;
    padding:10px;
    background:rgba(255,255,255,0.06);
    border-radius:10px;
    margin-top:10px;
}

/* SOCIAL */
.social a {
    display:inline-block;
    margin-right:10px;
    padding:10px 14px;
    border-radius:10px;
    background:rgba(255,255,255,0.06);
    text-decoration:none;
    color:white;
}
</style>
</head>

<body>

<!-- BACKGROUND -->
<div class="background">
    <div class="grid"></div>
</div>

<!-- NAV -->
<nav>
    <div class="logo">
        <img src="https://raw.githubusercontent.com/SaveOurSeas/Aquora/main/WhatsApp_Image_2026-05-01_at_00.50.57__1_-removebg-preview.png">
    </div>

    <div class="nav-links">
        <a onclick="show('home')">Home</a>
        <a onclick="show('shop')">Shop</a>
        <a onclick="show('cart')">Cart</a>
        <a onclick="show('social')">Social</a>
    </div>

    <div></div>
</nav>

<!-- HOME -->
<section id="home" class="active">

<div class="hero">
    <div>
        <h1>Aquora System</h1>
        <p>Water monitoring system for marine ecosystem protection.</p>
    </div>

    <img src="https://raw.githubusercontent.com/SaveOurSeas/Aquora/main/WhatsApp_Image_2026-05-01_at_00.50.57__1_-removebg-preview.png">
</div>

<div class="grid3">

    <div class="card">
        <h3>Scout</h3>
        <p>Collects water data</p>
    </div>

    <div class="card">
        <h3>AquaTalkie</h3>
        <p>Processes alerts</p>
    </div>

    <div class="card">
        <h3>Impact</h3>
        <p>Prevents damage early</p>
    </div>

</div>

</section>

<!-- SHOP -->
<section id="shop">

<h1>Shop</h1>

<div class="card">
    <h3>Full System</h3>
    <p>45,000 EGP</p>
    <button class="shop-btn" onclick="add('Full System',45000)">Add to Cart</button>
</div>

<div class="card">
    <h3>Rental</h3>
    <p>1,500 EGP / day</p>
    <button class="shop-btn" onclick="add('Rental',1500)">Add to Cart</button>
</div>

</section>

<!-- CART -->
<section id="cart">
<h1>Cart</h1>
<div id="box"></div>
<h3 id="total"></h3>
</section>

<!-- SOCIAL -->
<section id="social">
<h1>Social Media</h1>

<div class="social">

<a href="https://www.instagram.com/aquora.co" target="_blank">Instagram</a>
<a href="https://www.tiktok.com/@aquora.co" target="_blank">TikTok</a>

</div>

</section>

<script>

let cart = [];

function show(id){
    document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    if(id==="cart") render();
}

function add(name, price){
    let item = cart.find(i=>i.name===name);
    if(item) item.qty++;
    else cart.push({name,price,qty:1});
}

function render(){
    let box = document.getElementById("box");
    box.innerHTML="";
    let total=0;

    cart.forEach((i,index)=>{
        total += i.price*i.qty;
        box.innerHTML += `
        <div class="item">
            ${i.name} x${i.qty}
            <button onclick="removeItem(${index})">X</button>
        </div>`;
    });

    document.getElementById("total").innerText="Total: "+total+" EGP";
}

function removeItem(i){
    cart.splice(i,1);
    render();
}

</script>

</body>
</html>
