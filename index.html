<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aquora</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #061a33, #0b2f57);
    color: white;
    overflow-x: hidden;
}

/* smooth global easing (Framer-like) */
* {
    transition: all 0.35s cubic-bezier(0.22, 1, 0.36, 1);
}

/* NAV */
nav {
    display: flex;
    justify-content: space-between;
    padding: 15px 25px;
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
}

nav a {
    color: white;
    margin-left: 15px;
    cursor: pointer;
    text-decoration: none;
    opacity: 0.7;
}

nav a:hover {
    opacity: 1;
    transform: translateY(-2px);
}

/* PAGE SYSTEM (Framer-style transition) */
section {
    position: absolute;
    width: 100%;
    opacity: 0;
    transform: translateY(20px);
    pointer-events: none;
}

.active {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
}

/* HOME */
.hero {
    text-align: center;
    margin-top: 80px;
    animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1);
}

.hero h1 {
    font-size: 48px;
    margin-bottom: 10px;
}

.hero p {
    opacity: 0.8;
}

/* SHOP CARDS */
.card {
    background: rgba(255,255,255,0.06);
    padding: 20px;
    margin-top: 15px;
    border-radius: 15px;
    transform: translateY(20px);
    opacity: 0;
}

.card.show {
    transform: translateY(0);
    opacity: 1;
}

/* BUTTONS */
button {
    margin-top: 10px;
    padding: 10px 14px;
    cursor: pointer;
    border: none;
    border-radius: 8px;
    background: #00b7ff;
    color: white;
}

button:hover {
    transform: scale(1.05);
}

button:active {
    transform: scale(0.96);
}

/* CART ITEMS */
.item {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
    background: rgba(255,255,255,0.06);
    padding: 12px;
    border-radius: 10px;
    opacity: 0;
    transform: translateX(-10px);
}

.item.show {
    opacity: 1;
    transform: translateX(0);
}

/* POPUP */
#popup {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #00b7ff;
    padding: 12px 18px;
    border-radius: 10px;
    display: none;
    transform: translateY(10px);
}
#popup.show {
    transform: translateY(0);
}

/* KEYFRAME */
@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
</head>

<body>

<nav>
    <div>Aquora</div>
    <div>
        <a onclick="show('home')">Home</a>
        <a onclick="show('shop')">Shop</a>
        <a onclick="show('cart')">Cart</a>
    </div>
</nav>

<section id="home" class="active">
    <div class="hero">
        <h1>Aquora</h1>
        <p>Smart water monitoring system powered by Scout + AquaTalkie</p>
    </div>
</section>

<section id="shop">
    <h1>Shop</h1>

    <div class="card">
        <h3>Full System</h3>
        <p>45,000 EGP</p>
        <button onclick="add('Full System',45000)">Add to Cart</button>
    </div>

    <div class="card">
        <h3>Rental</h3>
        <p>1,500 EGP/day</p>
        <button onclick="add('Rental',1500)">Add to Cart</button>
    </div>
</section>

<section id="cart">
    <h1>Cart</h1>
    <div id="box"></div>
    <h3 id="total"></h3>
    <button onclick="checkout()">Checkout</button>
</section>

<div id="popup"></div>

<script>

let cart = [];
const phone = "201122450119";

function show(id){
    document.querySelectorAll("section").forEach(s => s.classList.remove("active"));
    let page = document.getElementById(id);
    page.classList.add("active");

    if(id === "shop") animateCards();
    if(id === "cart") render();
}

/* stagger animation like Framer */
function animateCards(){
    let cards = document.querySelectorAll(".card");
    cards.forEach((c,i)=>{
        c.classList.remove("show");
        setTimeout(()=>c.classList.add("show"), i*120);
    });
}

function add(name, price){
    let item = cart.find(i => i.name === name);

    if(item){
        item.qty++;
    } else {
        cart.push({name, price, qty:1});
    }

    toast("Added");
}

function removeItem(index){
    cart.splice(index,1);
    render();
}

function render(){
    let box = document.getElementById("box");
    box.innerHTML = "";

    let total = 0;

    cart.forEach((i,index) => {
        total += i.price * i.qty;

        box.innerHTML += `
            <div class="item">
                <span>${i.name} x${i.qty}</span>
                <span>
                    ${i.price * i.qty} EGP
                    <button onclick="removeItem(${index})">Remove</button>
                </span>
            </div>
        `;
    });

    document.getElementById("total").innerText = "Total: " + total + " EGP";

    // animate items in
    let items = document.querySelectorAll(".item");
    items.forEach((el,i)=>{
        setTimeout(()=>el.classList.add("show"), i*80);
    });
}

function checkout(){
    if(cart.length === 0){
        toast("Cart empty");
        return;
    }

    let total = cart.reduce((s,i)=>s+i.price*i.qty,0);

    let msg = "Aquora Order:%0A";

    cart.forEach(i=>{
        msg += `${i.name} x${i.qty}%0A`;
    });

    msg += `Total: ${total} EGP`;

    window.open(`https://wa.me/${phone}?text=${msg}`, "_blank");

    cart = [];
    render();

    toast("Order sent");
}

function toast(text){
    let popup = document.getElementById("popup");
    popup.innerText = text;
    popup.style.display = "block";

    setTimeout(()=>{
        popup.style.display = "none";
    }, 1800);
}

</script>

</body>
</html>
