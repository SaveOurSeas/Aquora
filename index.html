<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aquora</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #061a33, #0b2f57);
    color: white;
}

/* NAV */
nav {
    display: flex;
    justify-content: space-between;
    padding: 15px 25px;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(10px);
}

nav div:first-child {
    font-weight: bold;
    font-size: 18px;
}

nav a {
    color: white;
    margin-left: 15px;
    cursor: pointer;
    text-decoration: none;
    opacity: 0.8;
    transition: 0.2s;
}

nav a:hover {
    opacity: 1;
}

/* SECTIONS */
section {
    display: none;
    padding: 40px;
}

.active {
    display: block;
}

/* HOME */
.hero {
    text-align: center;
    margin-top: 60px;
}

.hero h1 {
    font-size: 42px;
    margin-bottom: 10px;
}

.hero p {
    opacity: 0.8;
    font-size: 18px;
}

/* CARDS */
.card {
    background: rgba(255,255,255,0.06);
    padding: 20px;
    margin-top: 15px;
    border-radius: 15px;
    transition: 0.2s;
}

.card:hover {
    transform: translateY(-3px);
}

button {
    margin-top: 10px;
    padding: 10px 14px;
    cursor: pointer;
    border: none;
    border-radius: 8px;
    background: #00b7ff;
    color: white;
    transition: 0.2s;
}

button:hover {
    background: #0096d4;
}

/* CART ITEMS */
.item {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
    background: rgba(255,255,255,0.06);
    padding: 12px;
    border-radius: 10px;
    align-items: center;
}

/* POPUP */
#popup {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #00b7ff;
    padding: 12px 18px;
    border-radius: 10px;
    display: none;
}
</style>
</head>

<body>

<nav>
    <div>Aquora</div>
    <div>
        <a onclick="show('home')">Home</a>
        <a onclick="show('shop')">Shop</a>
        <a onclick="show('cart')">Cart</a>
    </div>
</nav>

<!-- HOME -->
<section id="home" class="active">
    <div class="hero">
        <h1>Aquora</h1>
        <p>Smart water monitoring system powered by Scout + AquaTalkie</p>
    </div>
</section>

<!-- SHOP -->
<section id="shop">
    <h1>Shop</h1>

    <div class="card">
        <h3>Full System</h3>
        <p>45,000 EGP</p>
        <button onclick="add('Full System',45000)">Add to Cart</button>
    </div>

    <div class="card">
        <h3>Rental</h3>
        <p>1,500 EGP/day</p>
        <button onclick="add('Rental',1500)">Add to Cart</button>
    </div>
</section>

<!-- CART -->
<section id="cart">
    <h1>Your Cart</h1>
    <div id="box"></div>
    <h3 id="total"></h3>
    <button onclick="checkout()">Checkout</button>
</section>

<!-- POPUP -->
<div id="popup"></div>

<script>

let cart = [];
const phone = "201122450119";

function show(id){
    document.querySelectorAll("section").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");

    if(id === "cart") render();
}

function add(name, price){
    let item = cart.find(i => i.name === name);

    if(item){
        item.qty++;
    } else {
        cart.push({name, price, qty:1});
    }

    toast("Added to cart");
}

function removeItem(index){
    cart.splice(index,1);
    render();
}

function render(){
    let box = document.getElementById("box");
    box.innerHTML = "";

    let total = 0;

    cart.forEach((i,index) => {
        total += i.price * i.qty;

        box.innerHTML += `
            <div class="item">
                <span>${i.name} x${i.qty}</span>
                <span>
                    ${i.price * i.qty} EGP
                    <button onclick="removeItem(${index})">Remove</button>
                </span>
            </div>
        `;
    });

    document.getElementById("total").innerText = "Total: " + total + " EGP";
}

function checkout(){
    if(cart.length === 0){
        toast("Cart is empty");
        return;
    }

    let total = cart.reduce((s,i)=>s+i.price*i.qty,0);

    let msg = "Aquora Order:%0A";

    cart.forEach(i=>{
        msg += `${i.name} x${i.qty}%0A`;
    });

    msg += `Total: ${total} EGP`;

    window.open(`https://wa.me/${phone}?text=${msg}`, "_blank");

    cart = [];
    render();

    toast("Order sent");
}

/* CLEAN POPUP INSTEAD OF UGLY STATUS TEXT */
function toast(text){
    let popup = document.getElementById("popup");
    popup.innerText = text;
    popup.style.display = "block";

    setTimeout(() => {
        popup.style.display = "none";
    }, 2000);
}

</script>

</body>
</html>
