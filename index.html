<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aquora</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #061a33;
    color: white;
}

nav {
    display: flex;
    justify-content: space-between;
    padding: 15px;
    background: #00000055;
}

nav a {
    color: white;
    margin-left: 10px;
    cursor: pointer;
}

section {
    display: none;
    padding: 30px;
}

.active {
    display: block;
}

.card {
    background: #0d2a44;
    padding: 15px;
    margin-top: 10px;
    border-radius: 10px;
}

button {
    margin-top: 10px;
    padding: 8px 12px;
    cursor: pointer;
}

.item {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
    background: #0d2a44;
    padding: 10px;
    border-radius: 8px;
}
</style>
</head>

<body>

<nav>
    <div>Aquora</div>
    <div>
        <a onclick="show('home')">Home</a>
        <a onclick="show('shop')">Shop</a>
        <a onclick="show('cart')">Cart</a>
    </div>
</nav>

<section id="home" class="active">
    <h1>Aquora Vision</h1>
    <p>Water monitoring system using Scout + AquaTalkie.</p>
</section>

<section id="shop">
    <h1>Shop</h1>

    <div class="card">
        <h3>Full System</h3>
        <p>45,000 EGP</p>
        <button onclick="add('Full System',45000)">Add to Cart</button>
    </div>

    <div class="card">
        <h3>Rental</h3>
        <p>1,500 EGP/day</p>
        <button onclick="add('Rental',1500)">Add to Cart</button>
    </div>
</section>

<section id="cart">
    <h1>Cart</h1>

    <div id="box"></div>
    <h3 id="total"></h3>

    <button onclick="checkout()">Checkout</button>
</section>

<script>

let cart = [];
const phone = "201122450119";

function show(id){
    document.querySelectorAll("section").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");

    if(id === "cart") render();
}

function add(name, price){
    let item = cart.find(i => i.name === name);

    if(item){
        item.qty++;
    } else {
        cart.push({name, price, qty:1});
    }
}

function removeItem(index){
    cart.splice(index,1);
    render();
}

function render(){
    let box = document.getElementById("box");
    box.innerHTML = "";

    let total = 0;

    cart.forEach((i,index) => {
        total += i.price * i.qty;

        box.innerHTML += `
            <div class="item">
                <span>${i.name} x${i.qty}</span>
                <span>
                    ${i.price * i.qty} EGP
                    <button onclick="removeItem(${index})">Remove</button>
                </span>
            </div>
        `;
    });

    document.getElementById("total").innerText = "Total: " + total + " EGP";
}

function checkout(){
    let total = cart.reduce((s,i)=>s+i.price*i.qty,0);

    let msg = "Aquora Order:%0A";

    cart.forEach(i=>{
        msg += `${i.name} x${i.qty}%0A`;
    });

    msg += `Total: ${total}`;

    window.open(`https://wa.me/${phone}?text=${msg}`, "_blank");
}

</script>

</body>
</html>
