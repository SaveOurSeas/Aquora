<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aquora System</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: radial-gradient(circle at top, #061a33, #020713);
    color: #eaf2ff;
}

nav {
    display: flex;
    justify-content: space-between;
    padding: 16px 10%;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(20px);
    position: sticky;
    top: 0;
}

nav a {
    color: #9bbcff;
    margin-left: 15px;
    cursor: pointer;
    text-decoration: none;
}

section {
    display: none;
    padding: 90px 10%;
}

.active { display: block; }

.title {
    font-size: 48px;
    font-weight: 600;
}

.card {
    background: rgba(255,255,255,0.05);
    padding: 18px;
    border-radius: 14px;
    margin-top: 15px;
    border: 1px solid rgba(120,180,255,0.15);
}

button {
    margin-top: 10px;
    padding: 10px 16px;
    border-radius: 999px;
    border: none;
    background: #2f7bff;
    color: white;
    cursor: pointer;
}

.item {
    display: flex;
    justify-content: space-between;
    padding: 10px;
    background: rgba(255,255,255,0.05);
    margin-top: 10px;
    border-radius: 10px;
}
</style>
</head>

<body>

<nav>
    <div>Aquora</div>
    <div>
        <a onclick="show('shop')">Shop</a>
        <a onclick="show('cart')">Cart</a>
        <a onclick="show('done')">Status</a>
    </div>
</nav>

<!-- SHOP -->
<section id="shop" class="active">
    <div class="title">Aquora System</div>

    <div class="card">
        <h3>Full System (Scout + AquaTalkie)</h3>
        <p>Ownership of full environmental intelligence system</p>
        <b>45,000 EGP</b>
        <button onclick="add('Full System',45000)">Add to Cart</button>
    </div>

    <div class="card">
        <h3>Rental System</h3>
        <p>Daily deployment of Aquora system</p>
        <b>1,500 EGP / day</b>
        <button onclick="add('Rental (1 Day)',1500)">Add to Cart</button>
    </div>
</section>

<!-- CART -->
<section id="cart">
    <div class="title">Cart</div>

    <div id="box"></div>
    <h2 id="total"></h2>

    <button onclick="checkout()">Request Order</button>
</section>

<!-- DONE -->
<section id="done">
    <div class="title">Order Sent ✔</div>
    <p style="color:#a9bce6;">
        Your request has been sent. You will confirm via WhatsApp.
    </p>

    <button onclick="sendWhatsApp()">Open WhatsApp</button>
</section>

<script>

let cart = [];

/* YOUR NUMBER (FIXED FORMAT) */
const phone = "201122450119";

function show(id){
    document.querySelectorAll("section").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");

    if(id === "cart") render();
}

function add(name, price){
    let item = cart.find(i => i.name === name);
    if(item) item.qty++;
    else cart.push({name, price, qty:1});
}

function render(){
    let box = document.getElementById("box");
    box.innerHTML = "";

    let total = 0;

    cart.forEach(i => {
        total += i.price * i.qty;

        box.innerHTML += `
        <div class="item">
            <span>${i.name} × ${i.qty}</span>
            <span>${i.price * i.qty} EGP</span>
        </div>`;
    });

    document.getElementById("total").innerText = "Total: " + total + " EGP";
}

function checkout(){
    if(cart.length === 0){
        alert("Cart is empty");
        return;
    }
    show("done");
}

/* WHATSAPP MESSAGE */
function sendWhatsApp(){

    let total = cart.reduce((sum,i)=>sum+i.price*i.qty,0);

    let message = "Hello, I want to order Aquora system:%0A%0A";

    cart.forEach(i=>{
        message += `- ${i.name} x${i.qty}%0A`;
    });

    message += `%0ATotal: ${total} EGP`;

    let url = `https://wa.me/${phone}?text=${message}`;

    window.open(url, "_blank");
}

</script>

</body>
</html>
